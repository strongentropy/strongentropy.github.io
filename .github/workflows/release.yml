name: Release

on:
  push:
    tags:
      - 'v*'

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sbom-vex:
    name: Generate and attach SBOM + VEX
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to upload release assets

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: worker/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: worker
        run: pnpm install --frozen-lockfile

      - name: Generate CycloneDX SBOM
        working-directory: worker
        run: pnpm dlx @cyclonedx/cdxgen -t nodejs --spec-version 1.4 -o ../sbom.cdx.json .

      - name: Generate VEX document
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PKG_VERSION=$(node -p "require('./worker/package.json').version")
          AUDIT=$(cd worker && pnpm audit --json 2>/dev/null || echo '{"metadata":{"vulnerabilities":{"info":0,"low":0,"moderate":0,"high":0,"critical":0}}}')
          VULN_COUNT=$(echo "$AUDIT" | python3 -c "import sys,json; v=json.load(sys.stdin)['metadata']['vulnerabilities']; print(sum(v.get(s,0) for s in ['info','low','moderate','high','critical']))")

          if [ "$VULN_COUNT" = "0" ]; then
            IMPACT="pnpm audit returned 0 vulnerabilities across all worker dependencies at the time of ${TAG} release. No VEX statements are required."
            STATUS="not_affected"
            JUSTIFICATION="component_not_present"
          else
            IMPACT="See pnpm audit output for details. Review required."
            STATUS="under_investigation"
            JUSTIFICATION=""
          fi

          PKG_VERSION_VAL="$PKG_VERSION" python3 -c "
          import json, sys, os
          tag = os.environ['TAG']
          pkg_version = os.environ['PKG_VERSION_VAL']
          doc = {
            '@context': 'https://openvex.dev/ns/v0.2.0',
            '@id': f'https://github.com/strongentropy/strongentropy.github.io/blob/main/vex/{tag}.openvex.json',
            'author': 'Strong Entropy LLC',
            'role': 'Maintainer',
            'timestamp': '$TIMESTAMP',
            'version': 1,
            'tooling': 'pnpm audit 9.x; automated',
            'product': {
              '@id': 'https://github.com/strongentropy/strongentropy.github.io',
              'identifiers': {'purl': f'pkg:github/strongentropy/strongentropy.github.io@{tag}'},
              'subcomponents': [{'@id': f'pkg:npm/strongentropy-logger@{pkg_version}'}]
            },
            'statements': [{
              'vulnerability': {'description': f'Dependency vulnerability assessment at {tag}'},
              'products': [{'@id': 'https://github.com/strongentropy/strongentropy.github.io'}],
              'status': '$STATUS',
              'justification': '$JUSTIFICATION',
              'impact_statement': '$IMPACT'
            }]
          }
          print(json.dumps(doc, indent=2))
          " > vex/${{ github.ref_name }}.openvex.json

      - name: Attach SBOM and VEX to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" sbom.cdx.json --clobber
          gh release upload "${{ github.ref_name }}" vex/${{ github.ref_name }}.openvex.json --clobber
