name: Fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'  # weekly Monday 07:00 UTC

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  fuzz:
    name: Fuzz JavaScript targets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: worker/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: worker
        run: pnpm install --frozen-lockfile

      - name: Create crash output directory
        run: mkdir -p worker/fuzz/crashes

      - name: Fuzz parseUA
        working-directory: worker
        run: >
          pnpm exec jazzer fuzz/parse-ua.fuzz.js fuzz/corpus/parse-ua --sync
          -- -max_total_time=30 -artifact_prefix=fuzz/crashes/parse-ua-

      - name: Fuzz buildGraph
        working-directory: worker
        run: >
          pnpm exec jazzer fuzz/build-graph.fuzz.js fuzz/corpus/build-graph --sync
          -- -max_total_time=30 -artifact_prefix=fuzz/crashes/build-graph-

      - name: Fuzz unicode codec
        working-directory: worker
        run: >
          pnpm exec jazzer fuzz/unicode-codec.fuzz.js --sync
          -- -max_total_time=30 -artifact_prefix=fuzz/crashes/unicode-codec-

      - name: Fuzz timingSafeEqual
        working-directory: worker
        run: >
          pnpm exec jazzer fuzz/timing-safe.fuzz.js --sync
          -- -max_total_time=30 -artifact_prefix=fuzz/crashes/timing-safe-

      - name: Fuzz parseOS
        working-directory: worker
        run: >
          pnpm exec jazzer fuzz/parse-os.fuzz.js fuzz/corpus/parse-os --sync
          -- -max_total_time=30 -artifact_prefix=fuzz/crashes/parse-os-

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-crashes
          path: worker/fuzz/crashes/
          retention-days: 14
