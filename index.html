<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strong Entropy LLC</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    @font-face {
      font-family: 'Space Grotesk';
      src: url('/assets/fonts/space-grotesk-700.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0c0e;
      --surface: #13131a;
      --border:  #1f1f2e;
      --accent:  #7cfc9f;
      --dim:     #555570;
      --text:    #d8d8e8;
      --muted:   #888899;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3rem 3.5rem;
      max-width: 680px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.75rem;
      display: block;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f0f0f8;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      line-height: 1.6;
      white-space: nowrap;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 2rem;
    }

    .contact-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.9rem;
      font-size: 0.85rem;
    }

    .contact-row .label {
      color: var(--dim);
      min-width: 3.5rem;
      text-align: right;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .contact-row a {
      color: var(--accent);
      text-decoration: none;
    }

    .contact-row a:hover { text-decoration: underline; }

    .fingerprint-block {
      margin-top: 2rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1.2rem;
      text-align: center;
      overflow-x: auto;
    }

    .fingerprint-block .fp-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 0.5rem;
    }

    .fingerprint-block .fp {
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.06em;
      white-space: nowrap;
      line-height: 1.7;
      display: inline-block;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.06em;
    }
  </style>
</head>
